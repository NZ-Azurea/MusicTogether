<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Together</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <audio id="audio-player" preload="auto"></audio>
    
    <div class="app-container">
        <!-- Left Panel: Player controls -->
        <div class="panel player-panel glass">
            <div class="player-art">
                <i class="fas fa-compact-disc record-spin" id="disc-icon"></i>
            </div>
            <div class="player-info">
                <h2 id="now-playing-title">Not Playing</h2>
                <p id="now-playing-artist">Waiting for track...</p>
            </div>
            
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="seek-bar" value="0" min="0" max="100" />
                <span id="duration-time">0:00</span>
            </div>
            
            <div class="controls">
                <button class="icon-btn" onclick="sendAction('shuffle')"><i class="fas fa-random"></i></button>
                <button class="icon-btn" onclick="sendAction('skip', -1)"><i class="fas fa-step-backward"></i></button>
                <button class="icon-btn play-btn" id="play-pause-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                <button class="icon-btn" onclick="sendAction('skip')"><i class="fas fa-step-forward"></i></button>
                <button class="icon-btn" id="repeat-btn" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
            </div>
            
            <div class="extra-controls">
                <div class="volume-control">
                    <i class="fas fa-volume-up"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                </div>
                <button class="icon-btn love-btn" onclick="loveTrack()"><i class="far fa-heart"></i></button>
            </div>
        </div>

        <!-- Right Panel: Queue & Playlists -->
        <div class="panel queue-panel glass">
            <div class="queue-header">
                <h3>Up Next</h3>
                <button class="text-btn" onclick="openPlaylistsModal()"><i class="fas fa-list-music"></i> Playlists</button>
            </div>
            
            <div class="queue-list" id="queue-list">
                <!-- Queue items injected here -->
            </div>
            
            <div class="add-music-bar">
                <input type="text" id="music-url-input" placeholder="Paste YouTube link...">
                <button class="action-btn" onclick="addUrl()"><i class="fas fa-plus"></i> Add</button>
            </div>
        </div>
    </div>

    <!-- Playlists Floating Modal -->
    <div id="playlists-modal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Your Playlists</h2>
                <button class="icon-btn" onclick="closePlaylistsModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="playlists-grid" id="playlists-grid">
                <!-- Playlists injected here -->
            </div>
        </div>
    </div>
    
    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
